# プロンプトプレビュー用のサンプルデータ.
# scripts/preview_prompt.py がこのファイルを読み込み, 各リクエストの
# プロンプトテンプレートをレンダリングして preview.md に出力する.
#
# 形式は aiwolf_nlp_common.packet.* の from_dict が受ける dict 構造に沿わせる.

info:
  game_id: preview-game-0001
  day: 2
  agent: kanolab1
  profile: "名前: 佐藤 / 年齢: 25 / 性別: 男性 / 論理的で慎重な性格。村の若手のまとめ役。"
  medium_result: null
  divine_result:
    day: 2
    agent: kanolab1
    target: kanolab4
    result: HUMAN
  executed_agent: kanolab3
  attacked_agent: null
  vote_list:
    - day: 1
      agent: kanolab1
      target: kanolab3
    - day: 1
      agent: kanolab2
      target: kanolab3
    - day: 1
      agent: kanolab4
      target: kanolab3
  attack_vote_list: null
  status_map:
    kanolab1: ALIVE
    kanolab2: ALIVE
    kanolab3: DEAD
    kanolab4: ALIVE
    kanolab5: ALIVE
  role_map:
    kanolab1: SEER
  remain_count: 3
  # per_agent=-1 (無制限) の場合サーバは remain_length を送らないため null とする.
  remain_length: null
  remain_skip: 0

setting:
  agent_count: 5
  max_day: 5
  role_num_map:
    WEREWOLF: 1
    SEER: 1
    VILLAGER: 3
  vote_visibility: true
  # aiwolf-nlp-server/config/default_5.yml の実運用設定に合わせてある.
  # per_talk が -1 のときサーバは JSON から omit するため, このサンプルでも null とし,
  # base_length + mention_length の経路で constraints.jinja が動作することを確認できる.
  talk:
    max_count:
      per_agent: 4
      per_day: 20
    max_length:
      count_in_word: false
      count_spaces: false
      per_talk: null
      mention_length: 50
      per_agent: null
      base_length: 50
    max_skip: 0
  whisper:
    max_count:
      per_agent: 0
      per_day: 0
    max_length:
      count_in_word: false
      count_spaces: false
      per_talk: null
      mention_length: 50
      per_agent: null
      base_length: 50
    max_skip: 0
  vote:
    max_count: 1
    allow_self_vote: false
  attack_vote:
    max_count: 1
    allow_self_vote: false
    allow_no_target: false
  timeout:
    action: 60000
    response: 120000

role: SEER

# 呼び出し側で使う追加コンテキスト
sent_talk_count: 2
sent_whisper_count: 0

talk_history:
  - idx: 0
    day: 1
    turn: 0
    agent: kanolab1
    text: "おはよう。まずは自己紹介から始めませんか。"
    skip: false
    over: false
  - idx: 1
    day: 1
    turn: 0
    agent: kanolab2
    text: "いいですね。僕は静かに見守るタイプです。"
    skip: false
    over: false
  - idx: 2
    day: 2
    turn: 0
    agent: kanolab4
    text: "昨日の投票で kanolab3 が追放されましたね。次が肝心です。"
    skip: false
    over: false
  - idx: 3
    day: 2
    turn: 0
    agent: kanolab5
    text: "私は kanolab2 が少し不自然に感じました。"
    skip: false
    over: false

whisper_history:
  - idx: 0
    day: 1
    turn: 0
    agent: kanolab1
    text: "今日は kanolab3 を狙うのが安全そうだね。"
    skip: false
    over: false
  - idx: 1
    day: 1
    turn: 0
    agent: kanolab4
    text: "賛成。村側に疑われないよう表では別の話題を振ろう。"
    skip: false
    over: false

# single-turn モードで Agent が蓄積する day_events スナップショット履歴
day_events:
  - day: 1
    phase: daily_finish
    medium_result: null
    divine_result: null
    executed_agent: kanolab3
    attacked_agent: null
    vote_list:
      - day: 1
        agent: kanolab1
        target: kanolab3
      - day: 1
        agent: kanolab2
        target: kanolab3
      - day: 1
        agent: kanolab4
        target: kanolab3
    attack_vote_list: null
  - day: 2
    phase: daily_initialize
    medium_result: null
    divine_result:
      day: 2
      agent: kanolab1
      target: kanolab4
      result: HUMAN
    executed_agent: null
    attacked_agent: null
    vote_list: null
    attack_vote_list: null
